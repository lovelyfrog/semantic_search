name: release-mcp

on:
  push:
    tags:
      - "mcp-v*"

permissions:
  contents: write

jobs:
  build-and-upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: aarch64
            archive_ext: tar.gz
            ort_platform_dir: darwin-aarch64
            ort_asset: onnxruntime-osx-arm64
          - os: macos-13
            platform: darwin
            arch: x86_64
            archive_ext: tar.gz
            ort_platform_dir: darwin-x86_64
            ort_asset: onnxruntime-osx-x64
          - os: windows-latest
            platform: windows
            arch: x86_64
            archive_ext: zip
            ort_platform_dir: windows-x86_64
            ort_asset: onnxruntime-win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build semantic-search-mcp (release)
        run: cargo build --release --bin semantic-search-mcp

      - name: Download ONNX Runtime (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ORT_VERSION="1.20.1"
          ASSET="${{ matrix.ort_asset }}-${ORT_VERSION}"
          URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${ASSET}.tgz"
          echo "Downloading ${URL}"
          curl -L --fail -o ort.tgz "${URL}"
          rm -rf ort-extract
          mkdir -p ort-extract
          tar -xzf ort.tgz -C ort-extract
          LIB="$(find ort-extract -name 'libonnxruntime.dylib' -o -name 'libonnxruntime.so' | head -n 1)"
          if [[ -z "${LIB}" ]]; then
            echo "Could not find ONNX Runtime shared library in archive"
            exit 1
          fi
          mkdir -p "resources/onnxruntime/${{ matrix.ort_platform_dir }}"
          # 统一命名为代码期望的文件名
          if [[ "${LIB}" == *.dylib ]]; then
            cp "${LIB}" "resources/onnxruntime/${{ matrix.ort_platform_dir }}/onnxruntime.dylib"
          else
            cp "${LIB}" "resources/onnxruntime/${{ matrix.ort_platform_dir }}/onnxruntime.so"
          fi

      - name: Download ONNX Runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $OrtVersion = "1.20.1"
          $Asset = "${{ matrix.ort_asset }}-$OrtVersion"
          $Url = "https://github.com/microsoft/onnxruntime/releases/download/v$OrtVersion/$Asset.zip"
          Write-Host "Downloading $Url"
          Invoke-WebRequest -Uri $Url -OutFile "ort.zip"
          if (Test-Path ort-extract) { Remove-Item -Recurse -Force ort-extract }
          Expand-Archive -Path "ort.zip" -DestinationPath "ort-extract"
          $Dll = Get-ChildItem -Path "ort-extract" -Recurse -Filter "onnxruntime.dll" | Select-Object -First 1
          if (-not $Dll) { throw "Could not find onnxruntime.dll in archive" }
          New-Item -ItemType Directory -Force -Path "resources\\onnxruntime\\${{ matrix.ort_platform_dir }}" | Out-Null
          Copy-Item -Force $Dll.FullName "resources\\onnxruntime\\${{ matrix.ort_platform_dir }}\\onnxruntime.dll"

      - name: Stage package (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN=semantic-search-mcp
          PKG_DIR="${BIN}-${{ matrix.platform }}-${{ matrix.arch }}"
          rm -rf dist
          mkdir -p "dist/${PKG_DIR}"
          cp "target/release/${BIN}" "dist/${PKG_DIR}/${BIN}"
          cp -R resources "dist/${PKG_DIR}/resources"
          cp -f README.md "dist/${PKG_DIR}/README.md" || true
          cp -f README.zh-CN.md "dist/${PKG_DIR}/README.zh-CN.md" || true
          (cd dist && tar --exclude='*.DS_Store' -czf "../${BIN}-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive_ext }}" "${PKG_DIR}")

      - name: Stage package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Bin = "semantic-search-mcp"
          $PkgDir = "$Bin-${{ matrix.platform }}-${{ matrix.arch }}"
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Force -Path "dist\$PkgDir" | Out-Null
          Copy-Item -Force "target\release\$Bin.exe" "dist\$PkgDir\$Bin.exe"
          Copy-Item -Recurse -Force "resources" "dist\$PkgDir\resources"
          if (Test-Path "README.md") { Copy-Item -Force "README.md" "dist\$PkgDir\README.md" }
          if (Test-Path "README.zh-CN.md") { Copy-Item -Force "README.zh-CN.md" "dist\$PkgDir\README.zh-CN.md" }
          $ZipPath = "$Bin-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive_ext }}"
          if (Test-Path $ZipPath) { Remove-Item -Force $ZipPath }
          Compress-Archive -Path "dist\$PkgDir" -DestinationPath $ZipPath

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            semantic-search-mcp-${{ matrix.platform }}-${{ matrix.arch }}.${{ matrix.archive_ext }}

